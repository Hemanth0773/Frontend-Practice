<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Hover Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="card_container">
<!-- 1st card -->
                <article class="card_article">
                    <img src="images/northern-lights.jpg" alt="Aurora" class="card_img">

                    <div class="card_data">
                        <span class="card_description">Finland</span>
                        <h2 class="card_title">Aurora Lights</h2>
                        <a href="#" class="card_button">Read More</a>
                    </div>
                </article>
<!-- 2nd card -->
                <article class="card_article">
                    <img src="images/mt--fuji.jpg" alt="Mount Fuji" class="card_img">

                    <div class="card_data">
                        <span class="card_description">Japan</span>
                        <h2 class="card_title">Mount Fuji</h2>
                        <a href="#" class="card_button">Read More</a>
                    </div>
                </article>
<!-- 3rd card -->
                <article class="card_article">
                    <img src="images/timesquare.jpg" alt="Times Square" class="card_img">

                    <div class="card_data">
                        <span class="card_description">New York</span>
                        <h2 class="card_title">Times Square</h2>
                        <a href="#" class="card_button">Read More</a>
                    </div>
                </article>
            </div>
        </div>
    </main>
</body>
</html>
